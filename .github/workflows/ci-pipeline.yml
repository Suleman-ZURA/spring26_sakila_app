name: Sakila CI Pipeline
          mysql -h127.0.0.1 -uroot -padmin sakila < sakila-db/sakila-data.sql

      - name: Run tests
        run: |
          pytest tests/ -v


  build:

    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Verify image
        run: |
          docker images

      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 --name smoke $IMAGE_NAME:${{ github.sha }}
          sleep 10
          curl http://localhost:5000 || true
          docker stop smoke


  security-scan:

    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image again
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          output: trivy-results.txt
          exit-code: 0

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt