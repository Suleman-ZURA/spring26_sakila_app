name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["Sakila CI Pipeline"]
    types:
      - completed

  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

jobs:

  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print environment variables
        run: |
          echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}"
          echo "MYSQL_DB=${{ secrets.MYSQL_DB }}"

      - name: Run staging container
        run: |
          docker build -t sakila-app:staging .
          docker run -d -p 5000:5000 --name staging-container sakila-app:staging

      - name: Deployment summary
        run: |
          echo "### 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Image: sakila-app:staging" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Running" >> $GITHUB_STEP_SUMMARY

      - name: Slack notification (simulated)
        run: echo "Slack notification: Deployment to staging successful"


  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    environment:
      name: production
      # This triggers manual approval if configured in GitHub repo settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        run: echo "VERSION=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Production deployment
        run: |
          echo "Deploying to production..."
          docker build -t sakila-app:${{ env.VERSION }} .
          docker run -d -p 5000:5000 --name prod-container sakila-app:${{ env.VERSION }}

      - name: Production summary
        run: |
          echo "### 🚀 Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack notification (simulated)
        run: echo "Slack notification: Deployment to production successful"