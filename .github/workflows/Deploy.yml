name: Deployment Pipeline
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml

paths-ignore:
  - README.md
  - docs/**
  - '*.md'
  - .gitignore

jobs:


  deploy-staging:

    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Print Variables
        run: |
          echo "Deploying to staging"
          echo "Branch $GITHUB_REF"

      - name: Build Staging Image
        run: |
          docker build -t sakila:staging .

      - name: Job Summary
        run: |
          echo "## Staging Deployment Success" >> $GITHUB_STEP_SUMMARY
          echo "Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: sakila:staging" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: |
          echo "Slack notification: Deployment to staging successful"


  deploy-production:

    runs-on: ubuntu-latest

    needs: deploy-staging

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Simulated Production Deploy
        run: |
          echo "Deploying to production"

      - name: Notification
        run: |
          echo "Slack notification: Deployment to production successful"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Production Release