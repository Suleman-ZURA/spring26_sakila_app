name: Deployment Pipeline

permissions:
  contents: write
  
on:
  push:
    branches:
      - main
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"
      - "!README.md"
      - "!docs/**"
      - "!*.md"
      - "!.gitignore"

jobs:

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print environment
        run: |
          echo "Deploying to STAGING environment"

      - name: Build Docker image
        run: |
          docker build -t sakila-app:staging .

      - name: Run container (simulation)
        run: |
          docker run -d -p 5001:5000 --name staging-test sakila-app:staging
          sleep 10
          curl http://localhost:5001 || true
          docker stop staging-test

      - name: Deployment Summary
        run: |
          echo "## 🚀 Staging Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "Environment: staging" >> $GITHUB_STEP_SUMMARY
          echo "Image: sakila-app:staging" >> $GITHUB_STEP_SUMMARY
          echo "Status: SUCCESS" >> $GITHUB_STEP_SUMMARY

      - name: Notify
        run: |
          echo "Slack notification: Deployment to staging successful"


  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy message
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."

      - name: Generate version
        run: |
          echo "VERSION=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify
        run: |
          echo "Slack notification: Production deployment successful"