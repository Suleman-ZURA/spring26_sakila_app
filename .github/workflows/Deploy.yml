name: Sakila Deployment Workflow

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - '.gitignore'

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Simulate Staging Deployment
        run: |
          echo "Deploying to STAGING environment..."
          echo "Environment Variable Check: DB_HOST=staging-db"

      - name: Generate Job Summary
        run: |
          echo "### 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: 
      name: production # Triggers manual approval in GitHub Settings
    
    steps:
      - uses: actions/checkout@v4

      - name: Set Release Version
        id: vars
        run: echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Simulate Production Deployment
        run: |
          echo "Simulated production deployment message: Moving traffic to live servers..."
          echo "Version: ${{ steps.vars.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          body: |
            Automated production release.
            Built from commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notification
        run: echo "Slack notification: Deployment to production successful"